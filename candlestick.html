<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body, #container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-core.min.js"></script>
    <script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-stock.min.js"></script>
    <script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-data-adapter.min.js"></script>
    <div id="container"></div>
    <script>
        anychart.onDocumentReady(function() {
            anychart.data.loadCsvFile('../cvs/moex.csv', function (data) {
                chart = anychart.stock();
                chart.title('График акций Мос биржи');
                chart.container('container');
                chart.draw();
                dataTable = anychart.data.table(0, 'MMM d, yyyy');
                dataTable.addData(data);
                mapping = dataTable.mapAs({
                    'open': 2,
                    'high': 3,
                    'low': 4,
                    'close': 1
                });
                series = chart.plot(0).candlestick(mapping);
                series.name('MOEX');
                series.fallingFill('red');
                series.fallingStroke('black');
                series.risingStroke('black');
                series.risingFill('green');
            })
        })    
    </script>
</body>
</html>
